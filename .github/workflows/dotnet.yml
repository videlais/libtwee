# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test with Coverage
      run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
    
    - name: Generate Coverage Report
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        reportgenerator -reports:"TestResults/*/coverage.cobertura.xml" -targetdir:"CoverageReport" -reporttypes:"Html;Cobertura"
    
    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: CoverageReport/

    - name: Install DocFX
      run: dotnet tool install -g docfx

    - name: Build Documentation
      run: |
        cd docs
        docfx docfx.json

    - name: Upload Documentation
      uses: actions/upload-artifact@v7
      with:
        name: documentation
        path: docs/_site/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v6

    - name: Install DocFX
      run: |
        dotnet tool install -g docfx

    - name: Build Documentation
      run: |
        cd docs
        docfx docfx.json

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v4
      with:
        path: docs/_site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
